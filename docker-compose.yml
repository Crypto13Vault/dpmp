services:
  dpmp:
    build: .
    restart: unless-stopped
    stop_grace_period: 10s
    ports:
      - "3351:3351/tcp"
      - "8080:8080/tcp"
      - "9210:9210/tcp"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/config_v2.json:/data/config_v2.json
    environment:
      POOL_HOST: ""
      POOL_SSH_USER: ""
      POOL_SSH_PASS: ""
